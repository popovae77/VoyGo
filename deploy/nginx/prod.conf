# Шаг 2: HTTPS после certbot.
# Скопируйте в active.conf:
#   cp deploy/nginx/prod.conf deploy/nginx/active.conf
# Замените vayago.ru на ваш домен, если другой.

server {
    listen 80;
    server_name vayago.ru www.vayago.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name vayago.ru www.vayago.ru;

    ssl_certificate /etc/letsencrypt/live/vayago.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vayago.ru/privkey.pem;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 10m;

    location / {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }
}
